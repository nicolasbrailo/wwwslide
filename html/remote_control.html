<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="css/magick.min.css">
    <title>wwwslider remote control</title>
    <style>
      body { padding: 1em; }
      .hb_card { border: 1px solid #ccc; border-radius: 8px; padding: 1em; margin-bottom: 1em; }
      .hb_card h3 { margin: 0 0 .15em 0; }
      .hb_subtitle { font-size: .8em; color: #888; margin-bottom: .35em; }
      .hb_subtitle code { font-size: 1em; background: #f4f4f4; padding: 0 .25em; border-radius: 3px; }
      .hb_state { font-size: .9em; color: #666; margin-bottom: .5em; }
      .hb_state .offline { color: #c00; }
      .hb_state .online { color: #080; }
      .hb_meta { display: flex; gap: 1.5em; margin-bottom: .5em; flex-wrap: wrap; }
      .hb_meta_col { flex: 1; min-width: 18em; }
      .hb_meta h4 { margin: .25em 0; font-size: .9em; color: #444; }
      table.kv { font-size: .85em; border-collapse: collapse; }
      table.kv th, table.kv td { text-align: left; padding: 1px 6px; vertical-align: top; }
      table.kv th { color: #666; font-weight: normal; white-space: nowrap; }
      table.kv td { word-break: break-all; }
      .hb_controls button { margin-right: .25em; }
      .hb_config { margin-top: .5em; font-size: .9em; }
      .hb_config label { margin-right: 1em; }
      .hb_config input[type=text] { width: 5em; }
      #status { color: #666; font-size: .85em; }
    </style>
</head>
<body>
    <h1>Homeboard remote control</h1>
    <p id="status">Loading…</p>
    <div id="hb_list"></div>

    <script src="js/miniJQuery.js"></script>
    <script src="js/remote_control.js"></script>
</body>
</html>
